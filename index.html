<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LENS Pro Terminal</title>
    
    <!-- Telegram Web App JS API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        nexaDark: '#0d1117',
                        nexaCard: '#161b22',
                        nexaGreen: '#00e676',
                        nexaGreenDim: 'rgba(0, 230, 118, 0.1)',
                    }
                }
            }
        }
    </script>
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        /* Hides scrollbar for clean app look */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex justify-center h-screen overflow-y-auto">

    <!-- Mobile App Container -->
    <div class="w-full max-w-md bg-nexaDark min-h-screen p-4 flex flex-col gap-6 relative">
        
        <!-- Header -->
        <header class="flex justify-between items-center mt-2">
            <div class="flex items-center gap-2 text-nexaGreen font-bold text-xl tracking-wider">
                <i class="fa-solid fa-bolt"></i> LENS
            </div>
            <div class="flex gap-4 text-gray-400 text-lg">
                <i class="fa-solid fa-bell relative">
                    <span class="absolute -top-1 -right-1 bg-red-500 rounded-full w-2 h-2"></span>
                </i>
                <i class="fa-solid fa-bars"></i>
            </div>
        </header>

        <!-- Live Feed Pill -->
        <div class="flex justify-center">
            <div class="bg-nexaCard border border-gray-800 rounded-full px-4 py-1 flex items-center gap-2 text-xs font-semibold text-gray-300">
                <i class="fa-solid fa-arrow-trend-up text-nexaGreen"></i>
                LIVE: b***@gmail.com <span class="text-nexaGreen">+$42,453</span>
            </div>
        </div>

        <!-- Greeting -->
        <div>
            <p class="text-gray-400 text-sm">Good Morning,</p>
            <h1 class="text-2xl font-bold tracking-wide">ADMIN 👑</h1>
        </div>

        <!-- Main Balance Card -->
        <div class="bg-nexaCard rounded-3xl p-6 relative shadow-lg shadow-black/50 border border-gray-800">
            <p class="text-gray-400 text-xs font-bold tracking-widest uppercase mb-1">• Current Balance</p>
            <h2 class="text-4xl font-black mb-3">$322.26</h2>
            <div class="flex gap-2 text-xs font-bold">
                <span class="bg-nexaGreenDim text-nexaGreen px-2 py-1 rounded">+$126,310.80</span>
                <span class="text-gray-400 py-1">+39,195.31% all-time</span>
            </div>
            <i class="fa-regular fa-eye-slash absolute top-6 right-6 text-gray-500 text-lg"></i>
        </div>

        <!-- Action Buttons Matrix -->
        <div class="grid grid-cols-3 gap-3">
            <button id="deposit-btn" class="bg-nexaGreenDim border border-nexaGreen/30 rounded-2xl p-4 flex flex-col items-center gap-2 hover:bg-nexaGreen/20 active:scale-95 transition-all">
                <i class="fa-solid fa-wallet text-nexaGreen text-xl"></i>
                <span class="text-nexaGreen font-bold text-sm">Deposit</span>
            </button>
            <button id="withdraw-btn" class="bg-nexaCard border border-gray-800 rounded-2xl p-4 flex flex-col items-center gap-2 hover:bg-gray-800 active:scale-95 transition-all">
                <i class="fa-solid fa-arrow-down text-gray-300 text-xl"></i>
                <span class="text-gray-300 font-bold text-sm">Withdraw</span>
            </button>
            <button id="trade-btn" class="bg-nexaCard border border-gray-800 rounded-2xl p-4 flex flex-col items-center gap-2 hover:bg-gray-800 active:scale-95 transition-all">
                <i class="fa-solid fa-chart-line text-gray-300 text-xl"></i>
                <span class="text-gray-300 font-bold text-sm">Trade</span>
            </button>
        </div>

        <!-- Statistics Grid -->
        <div class="grid grid-cols-2 gap-3">
            <div class="bg-nexaCard border border-gray-800 rounded-2xl p-4">
                <p class="text-gray-400 text-xs font-bold uppercase mb-1">Total Profit</p>
                <h3 class="text-xl font-black text-nexaGreen">$126,310.80</h3>
            </div>
            <div class="bg-nexaCard border border-gray-800 rounded-2xl p-4">
                <p class="text-gray-400 text-xs font-bold uppercase mb-1">Total Trades</p>
                <h3 class="text-xl font-black text-yellow-500">962</h3>
            </div>
        </div>

        <!-- Market Overview -->
        <div class="mt-2">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-gray-300 font-bold"><i class="fa-solid fa-bolt text-nexaGreen mr-2"></i> Market Overview</h3>
                <span class="text-gray-500 text-xs font-bold cursor-pointer hover:text-white">View More ></span>
            </div>
            
            <!-- Asset Row -->
            <div class="bg-nexaCard border border-gray-800 rounded-2xl p-4 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="bg-orange-500/20 p-2 rounded-full">
                        <i class="fa-brands fa-bitcoin text-orange-500 text-xl"></i>
                    </div>
                    <div>
                        <h4 class="font-bold text-gray-200">Bitcoin</h4>
                        <p class="text-gray-500 text-xs">BTC</p>
                    </div>
                </div>
                <div class="text-right">
                    <h4 class="font-bold text-gray-200">$74,598.35</h4>
                    <p class="text-red-500 text-xs bg-red-500/10 inline-block px-1 rounded mt-1">📉 1.05%</p>
                </div>
            </div>
        </div>

    </div>

    <!-- Init Telegram WebApp API Engine & Action Listeners -->
    <script>
        // 1. Setup viewport variables
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
        
        window.Telegram.WebApp.setHeaderColor('#0d1117');
        window.Telegram.WebApp.setBackgroundColor('#0d1117');

        // 2. Data transmission protocol
        function sendActionToBackend(actionName) {
            const payload = {
                action: actionName,
                timestamp: new Date().getTime(),
                client: "LENS_Mobile_Terminal"
            };
            
            // Fires data package directly to Python's web_app_data_handler listener
            window.Telegram.WebApp.sendData(JSON.stringify(payload));
        }

        // 3. Event bindings for interactive matrix buttons
        document.getElementById('deposit-btn').addEventListener('click', () => {
            sendActionToBackend('deposit');
        });

        document.getElementById('withdraw-btn').addEventListener('click', () => {
            sendActionToBackend('withdraw');
        });

        document.getElementById('trade-btn').addEventListener('click', () => {
            sendActionToBackend('trade');
        });
    </script>
</body>
</html>
