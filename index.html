<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexas-Level Quantum Terminal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #06080a;
            --card-bg: rgba(24, 26, 32, 0.85);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #f5f5f7;
            --text-muted: #848e9c;
            --primary: #f0b90b;
            --success: #0ecb81;
            --danger: #f6465d;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 0;
            overflow-x: hidden;
        }
        /* Live Ticker Styling */
        .notification-ticker {
            width: 100%;
            background-color: #0c0e12;
            border-bottom: 1px solid var(--border-color);
            padding: 10px 0;
            text-align: center;
            font-size: 12px;
        }
        .ticker-content { display: inline-block; transition: opacity 0.4s ease; }
        
        /* Layout Structure */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
        }
        .menu-btn {
            font-size: 22px; cursor: pointer; color: var(--text-main);
        }
        .dashboard-container {
            padding: 20px; max-width: 480px; margin: 0 auto;
        }
        
        /* Glassmorphism Balance Card */
        .balance-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 20px; padding: 22px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            margin-bottom: 20px;
        }
        .balance-label {
            font-size: 12px; color: var(--text-muted);
            display: flex; align-items: center; gap: 8px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .balance-amount {
            font-size: 38px; font-weight: 700; margin: 10px 0;
            letter-spacing: -1px;
        }
        
        /* Greed Matrix Selectors */
        .greed-section { margin-bottom: 25px; }
        .greed-title { font-size: 13px; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase;}
        .greed-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .greed-btn {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border-color);
            color: var(--text-muted); border-radius: 12px; padding: 12px 5px;
            font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .greed-btn.active[data-level="low"] { background: rgba(14,203,129,0.15); border-color: var(--success); color: var(--success); }
        .greed-btn.active[data-level="mid"] { background: rgba(240,185,11,0.15); border-color: var(--primary); color: var(--primary); }
        .greed-btn.active[data-level="high"] { background: rgba(246,70,93,0.15); border-color: var(--danger); color: var(--danger); }

        /* Sliding Functional Sidebar Drawer Menu */
        .sidebar-drawer {
            position: fixed; top: 0; left: -280px; width: 260px; height: 100%;
            background: #0d1117; border-right: 1px solid var(--border-color);
            z-index: 1000; transition: left 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
            padding: 20px; box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }
        .sidebar-drawer.open { left: 0; }
        .drawer-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 999; display: none;
        }
        .drawer-overlay.show { display: block; }
        .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .drawer-menu-item {
            display: flex; align-items: center; gap: 15px; padding: 14px 10px;
            color: var(--text-main); font-weight: 500; font-size: 15px;
            cursor: pointer; border-radius: 10px; transition: background 0.2s;
        }
        .drawer-menu-item:hover { background: rgba(255,255,255,0.05); }
        .drawer-menu-item i { width: 20px; color: var(--primary); font-size: 18px; }

        /* Operational Core Actions */
        .actions-layout { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .action-node {
            background: var(--card-bg); border: 1px solid var(--border-color);
            color: var(--text-main); border-radius: 14px; padding: 16px 5px;
            font-size: 13px; font-weight: 600; cursor: pointer; display: flex;
            flex-direction: column; align-items: center; gap: 8px;
        }
    </style>
</head>
<body>

    <div class="drawer-overlay" id="overlay" onclick="toggleMenuDrawer()"></div>
    
    <!-- FUNCTIONAL SIDEBAR DRAWER MENU -->
    <div class="sidebar-drawer" id="drawer">
        <div class="drawer-header">
            <h3 style="margin:0; color:var(--primary);"><i class="fa-solid fa-robot"></i> NEXAS Core</h3>
            <i class="fa-solid fa-xmark" style="cursor:pointer; font-size:20px;" onclick="toggleMenuDrawer()"></i>
        </div>
        <div class="drawer-menu-item" onclick="sendActionToBot('menu_profile')"><i class="fa-solid fa-user-shield"></i> User Account Profile</div>
        <div class="drawer-menu-item" onclick="sendActionToBot('menu_plans')"><i class="fa-solid fa-layer-group"></i> AI Strategy Plans</div>
        <div class="drawer-menu-item" onclick="sendActionToBot('menu_history')"><i class="fa-solid fa-clock-rotate-left"></i> Transaction Ledgers</div>
        <div class="drawer-menu-item" onclick="sendActionToBot('menu_wallets')"><i class="fa-solid fa-wallet"></i> Secured Node Hot Wallets</div>
        <div class="drawer-menu-item" onclick="sendActionToBot('menu_support')"><i class="fa-solid fa-headset"></i> Architecture Support</div>
    </div>

    <!-- LIVE CONVINCING SIMULATION TICKER -->
    <div class="notification-ticker">
        <span id="ticker-text" class="ticker-content">Syncing Nexas Ledger Pool...</span>
    </div>

    <div class="navbar">
        <i class="fa-solid fa-bars-staggered menu-btn" onclick="toggleMenuDrawer()"></i>
        <span style="font-weight:700; letter-spacing:0.5px; font-size:16px;">NEXAS TERMINAL</span>
        <i class="fa-solid fa-shield-halved" style="color:var(--primary); font-size:18px;"></i>
    </div>

    <div class="dashboard-container">
        <!-- BALANCE FRAMEWORK -->
        <div class="balance-card">
            <div class="balance-label">
                <span>Active Capital Index</span>
                <i class="fa-solid fa-eye" id="eye-icon" style="cursor:pointer;" onclick="togglePrivacy()"></i>
            </div>
            <div class="balance-amount" id="balance-display">$322.26</div>
            <div style="color: var(--success); font-weight: 600; font-size: 13px;">
                +$126,310.80 <span style="color: var(--text-muted); font-weight:normal; font-size:11px;">+39,195.31% all-time</span>
            </div>
        </div>

        <!-- REVOLUTIONARY GREED MATRIX ADJUSTER -->
        <div class="greed-section">
            <div class="greed-title">Algorithmic Greed Optimization Matrix</div>
            <div class="greed-grid">
                <button class="greed-btn active" data-level="low" onclick="setGreed('low')">🛡️ LOW</button>
                <button class="greed-btn" data-level="mid" onclick="setGreed('mid')">⚖️ MID</button>
                <button class="greed-btn" data-level="high" onclick="setGreed('high')">⚡ HIGH</button>
            </div>
        </div>

        <!-- OPERATIONS PANEL -->
        <div class="actions-layout">
            <button class="action-node" onclick="sendActionToBot('deposit')"><i class="fa-solid fa-circle-plus"></i>Deposit</button>
            <button class="action-node" onclick="sendActionToBot('withdraw')"><i class="fa-solid fa-circle-minus"></i>Withdraw</button>
            <button class="action-node" onclick="sendActionToBot('trade')"><i class="fa-solid fa-bolt"></i>Autotrade</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let hidden = false;
        const bal = "$322.26";

        function toggleMenuDrawer() {
            document.getElementById("drawer").classList.toggle("open");
            document.getElementById("overlay").classList.toggle("show");
        }

        function togglePrivacy() {
            hidden = !hidden;
            document.getElementById("balance-display").innerText = hidden ? "••••••" : bal;
            document.getElementById("eye-icon").className = hidden ? "fa-solid fa-eye-slash" : "fa-solid fa-eye";
        }

        function setGreed(level) {
            document.querySelectorAll('.greed-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-level="${level}"]`).classList.add('active');
            sendActionToBot(`greed_${level}`);
        }

        const letters = ["b","d","f","g","k","m","n","p","r","s","t","w"];
        const chains = ["@gmail.com","@yahoo.com","@proton.me","@outlook.com"];
        
        function runTicker() {
            const t = document.getElementById("ticker-text");
            if(!t) return;
            t.style.opacity = 0;
            setTimeout(() => {
                const mail = letters[Math.floor(Math.random()*letters.length)] + "***" + chains[Math.floor(Math.random()*chains.length)];
                const choice = Math.floor(Math.random()*3);
                if(choice === 0) {
                    t.innerHTML = `⚙️ **NEW ENGINE CONFIG:** User <span>${mail}</span> linked to localized trading node.`;
                } else if(choice === 1) {
                    t.innerHTML = `🟢 **USDT INGESTED:** User <span>${mail}</span> added <span style="color:var(--success); font-weight:600;">+$${Math.floor(Math.random()*24000+600).toLocaleString()}</span> via smart network.`;
                } else {
                    t.innerHTML = `💸 **SETTLEMENT VERIFIED:** User <span>${mail}</span> systematically settled <span style="color:var(--primary); font-weight:600;">$${Math.floor(Math.random()*9500+200).toLocaleString()}</span> out framework pool.`;
                }
                t.style.opacity = 1;
            }, 400);
        }
        setInterval(runTicker, 4500);
        runTicker();

        function sendActionToBot(action) {
            tg.sendData(JSON.stringify({ action: action }));
        }
    </script>
</body>
</html>
