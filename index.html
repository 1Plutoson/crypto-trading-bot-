<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LENs Web3 Trading Core</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tweetnacl/1.0.3/nacl-fast.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bs58@5.0.0/dist/index.bundle.js"></script>
    
    <style>
        body {
            background-color: #0b0e14;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background: #151a26;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid #242f47;
        }
        h2 { color: #00ffcc; margin-bottom: 5px; font-weight: 600; }
        p { color: #8a99ad; font-size: 14px; margin-bottom: 25px; }
        .btn {
            background: linear-gradient(135deg, #00ffcc 0%, #0099ff 100%);
            color: #0b0e14;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, opacity 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        .status-box {
            margin-top: 20px;
            padding: 12px;
            background: #1e2638;
            border-radius: 8px;
            font-size: 13px;
            word-break: break-all;
            border: 1px solid #2d3b56;
            display: none;
        }
        .success { color: #00ffcc; border-color: #00ffcc; }
    </style>
</head>
<body>

<div class="container">
    <h2>LENs Core Terminal</h2>
    <p>Secure Solana Network Sync</p>
    
    <button class="btn" id="connectBtn" onclick="connectWallet()">Connect Phantom Wallet</button>
    
    <div class="status-box" id="statusBox">Initializing terminal...</div>
</div>

<script>
    // Initialize Telegram WebApp interface
    const tg = window.Telegram.WebApp;
    tg.expand(); // Opens full screen inside Telegram

    // App Configuration for Deep Linking
    const NETWORK_CLUSTER = "mainnet-beta";
    const APP_URL = window.location.origin + window.location.pathname;

    // Ephemeral Keypair generation for encryption session
    let dappKeyPair = null;
    if (!localStorage.getItem('dapp_pvt_key')) {
        const kp = nacl.box.keyPair();
        localStorage.setItem('dapp_pvt_key', bs58.encode(kp.secretKey));
        localStorage.setItem('dapp_pub_key', bs58.encode(kp.publicKey));
    }
    
    const dappSecretKey = bs58.decode(localStorage.getItem('dapp_pvt_key'));
    const dappPublicKey = bs58.decode(localStorage.getItem('dapp_pub_key'));

    // Status display update utility
    function updateStatus(msg, isSuccess = false) {
        const box = document.getElementById('statusBox');
        box.style.display = "block";
        box.innerText = msg;
        if (isSuccess) box.classList.add('success');
    }

    // --- SECURE INBOUND PROCESSING LOOP (When Phantom redirects back) ---
    window.addEventListener('load', () => {
        const params = new URLSearchParams(window.location.search);
        
        if (params.has("data") && params.has("nonce")) {
            try {
                const phantomPublicKey = bs58.decode(params.get("phantom_encryption_public_key"));
                const nonce = bs58.decode(params.get("nonce"));
                const encryptedData = bs58.decode(params.get("data"));

                // Decrypt payload from Phantom securely
                const decrypted = nacl.box.open(encryptedData, nonce, phantomPublicKey, dappSecretKey);
                if (!decrypted) throw new Error("Decryption failed. Secure link compromised.");

                const data = JSON.parse(new TextDecoder().decode(decrypted));
                
                if (data.public_key) {
                    const userWallet = data.public_key;
                    updateStatus(`🔒 Securely Connected: ${userWallet}`, true);
                    document.getElementById('connectBtn').style.display = 'none';
                    
                    // Send user public key back to Python Backend server if running
                    sendToBackend(userWallet);
                }
            } catch (err) {
                updateStatus(`⚠️ Security Handshake Failed: ${err.message}`);
            }
        }
    });

    // --- CONNECT EXECUTION TRIGGER ---
    async function connectWallet() {
        // Option A: Provider available natively (Desktop or In-Wallet Browser)
        if (window.solana && window.solana.isPhantom) {
            try {
                const response = await window.solana.connect();
                const userWallet = response.publicKey.toString();
                updateStatus(`🔒 Securely Connected: ${userWallet}`, true);
                sendToBackend(userWallet);
            } catch (err) {
                updateStatus(`Connection rejected: ${err.message}`);
            }
        } 
        // Option B: Universal Deep Linking Handshake (Mobile App Context)
        else {
            updateStatus("Redirecting to Phantom Secure Vault...");
            const dAppPubBase58 = localStorage.getItem('dapp_pub_key');
            
            // Build parameters conforming strictly to Phantom standard
            const connectUrl = `https://phantom.app/ul/v1/connect?` + 
                `app_url=${encodeURIComponent(APP_URL)}` +
                `&dapp_encryption_public_key=${dAppPubBase58}` +
                `&redirect_link=${encodeURIComponent(APP_URL)}` +
                `&cluster=${NETWORK_CLUSTER}`;
            
            // Fire redirect to external wallet app natively
            window.location.href = connectUrl;
        }
    }

    function sendToBackend(walletAddress) {
        // Optional hook: Sends address straight to your local or deployed FastAPI core
        fetch('http://localhost:8000/api/register_wallet', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_public_key: walletAddress })
        }).catch(e => console.log("Backend offline, address saved locally inside client interface."));
    }
</script>

</body>
</html>
