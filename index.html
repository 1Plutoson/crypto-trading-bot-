<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LENS Pro Terminal Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0e11;
            --card-bg: #181a20;
            --text-main: #eaecef;
            --text-muted: #848e9c;
            --primary: #f0b90b;
            --success: #0ecb81;
            --danger: #f6465d;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* Live Ticker Styling */
        .notification-ticker {
            width: 100%;
            background-color: #12161a;
            border-bottom: 1px solid #23282d;
            padding: 10px 0;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
        }
        .ticker-content {
            display: inline-block;
            transition: opacity 0.5s ease-in-out;
        }
        /* Container */
        .dashboard-container {
            width: 90%;
            max-width: 450px;
            margin-top: 20px;
        }
        .header {
            margin-bottom: 20px;
        }
        .header h2 {
            margin: 0;
            font-size: 18px;
            color: var(--text-muted);
        }
        .header h1 {
            margin: 5px 0 0 0;
            font-size: 26px;
            font-weight: bold;
        }
        /* Balance Card */
        .balance-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 25px;
            position: relative;
        }
        .balance-label {
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .privacy-toggle {
            cursor: pointer;
            color: var(--text-muted);
            font-size: 16px;
            transition: color 0.2s;
        }
        .privacy-toggle:hover {
            color: var(--text-main);
        }
        .balance-amount {
            font-size: 36px;
            font-weight: 700;
            margin: 12px 0;
            letter-spacing: -0.5px;
            transition: all 0.1s;
        }
        /* Action Buttons Grid */
        .actions-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .action-btn {
            background-color: var(--card-bg);
            border: 1px solid #2b3139;
            color: var(--text-main);
            border-radius: 12px;
            padding: 15px 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .action-btn:active {
            transform: scale(0.95);
            background-color: #2b3139;
        }
        .action-btn i {
            font-size: 20px;
            color: var(--primary);
        }
    </style>
</head>
<body>

    <!-- 1. LIVE CONVINCING SIMULATION TICKER -->
    <div class="notification-ticker">
        <span id="ticker-text" class="ticker-content">Initializing Secure Feed...</span>
    </div>

    <div class="dashboard-container">
        <div class="header">
            <h2>Welcome Back,</h2>
            <h1>ADMIN Node 👑</h1>
        </div>

        <!-- 2. BALANCE CARD WITH FUNCTIONAL PRIVACY EYE TOGGLE -->
        <div class="balance-card">
            <div class="balance-label">
                <span>Current Balance</span>
                <i class="fa-solid fa-eye privacy-toggle" id="eye-icon" onclick="toggleBalancePrivacy()"></i>
            </div>
            <div class="balance-amount" id="balance-display">$322.26</div>
            <div style="color: var(--success); font-weight: 600; font-size: 14px;">
                +$126,310.80 <span style="color: var(--text-muted); font-weight: normal; font-size: 12px;">+39,195.31% all-time</span>
            </div>
        </div>

        <!-- 3. TERMINAL TELEMETRY ACTION GRID -->
        <div class="actions-grid">
            <button class="action-btn" onclick="sendActionToBot('deposit')">
                <i class="fa-solid fa-wallet"></i>
                Deposit
            </button>
            <button class="action-btn" onclick="sendActionToBot('withdraw')">
                <i class="fa-solid fa-money-bill-transfer"></i>
                Withdraw
            </button>
            <button class="action-btn" onclick="sendActionToBot('trade')">
                <i class="fa-solid fa-chart-line"></i>
                Autotrade
            </button>
        </div>
    </div>

    <script>
        // Initialize Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();

        // --- PRIVACY EYE LOGIC ---
        let isBalanceHidden = false;
        const realBalance = "$322.26";
        const maskedBalance = "••••••";

        function toggleBalancePrivacy() {
            const balanceElement = document.getElementById("balance-display");
            const eyeIcon = document.getElementById("eye-icon");
            
            isBalanceHidden = !isBalanceHidden;
            
            if (isBalanceHidden) {
                balanceElement.innerText = maskedBalance;
                eyeIcon.classList.remove("fa-eye");
                eyeIcon.classList.add("fa-eye-slash");
            } else {
                balanceElement.innerText = realBalance;
                eyeIcon.classList.remove("fa-eye-slash");
                eyeIcon.classList.add("fa-eye");
            }
        }

        // --- LIVE NOTIFICATION TICKER SIMULATOR ---
        const prefixes = ["a", "c", "f", "h", "k", "m", "o", "r", "s", "t", "w", "z"];
        const platforms = ["@gmail.com", "@yahoo.com", "@outlook.com", "@proton.me", "@icloud.com"];
        
        function updateLiveTicker() {
            const tickerText = document.getElementById("ticker-text");
            if (!tickerText) return;

            // Fade out
            tickerText.style.opacity = 0;

            setTimeout(() => {
                const randomUser = prefixes[Math.floor(Math.random() * prefixes.length)] + "***" + platforms[Math.floor(Math.random() * platforms.length)];
                const eventType = Math.floor(Math.random() * 3); // 0 = Registration, 1 = Deposit, 2 = Withdrawal
                
                let htmlContent = "";

                if (eventType === 0) {
                    htmlContent = `<i class="fa-solid fa-user-plus" style="color: #38b6ff;"></i> REGISTRATION: <span style="color: var(--text-main); font-key: 600;">${randomUser}</span> successfully created a secure trading node.`;
                } else if (eventType === 1) {
                    const depositAmt = Math.floor(Math.random() * (50000 - 500 + 1) + 500).toLocaleString();
                    htmlContent = `<i class="fa-solid fa-circle-arrow-down" style="color: var(--success);"></i> DEPOSIT: <span>${randomUser}</span> credited <span style="color: var(--success); font-weight:600;">+$${depositAmt} USDT</span>`;
                } else {
                    const withdrawAmt = Math.floor(Math.random() * (12000 - 100 + 1) + 100).toLocaleString();
                    htmlContent = `<i class="fa-solid fa-circle-arrow-up" style="color: var(--danger);"></i> WITHDRAWAL: <span>${randomUser}</span> extracted <span style="color: var(--danger); font-weight:600;">$${withdrawAmt} USDT</span> successfully.`;
                }

                tickerText.innerHTML = htmlContent;
                tickerText.style.opacity = 1; // Fade back in
            }, 500);
        }

        // Rotate notification every 4 seconds
        setInterval(updateLiveTicker, 4000);
        updateLiveTicker();

        // --- TELEMETRY BOT BRIDGE ---
        function sendActionToBot(actionType) {
            const payload = { action: actionType };
            tg.sendData(json.stringify(payload));
        }
    </script>
</body>
</html>
