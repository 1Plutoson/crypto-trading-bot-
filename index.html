<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LENs -CRYPTO_LLC | Web3 Terminal</title>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>
    <style>
        :root {
            --bg-dark: #07090e; --surface: #111520;
            --primary: #f0b90b; --success: #0ecb81; --text-main: #eaecef;
        }
        body { background: var(--bg-dark); color: var(--text-main); font-family: -apple-system, sans-serif; padding: 20px; }
        .card { background: var(--surface); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .btn { width: 100%; padding: 15px; background: var(--primary); color: #000; font-weight: bold; border: none; border-radius: 8px; margin-top: 10px; cursor: pointer; text-transform: uppercase;}
        #wallet-status { font-family: monospace; color: var(--success); margin-bottom: 15px; display: block;}
    </style>
</head>
<body>

    <h2>LENs Web3 Execution</h2>
    
    <div class="card">
        <h3>1. Connect Infrastructure</h3>
        <span id="wallet-status">Status: Disconnected</span>
        <button class="btn" onclick="connectPhantom()">Connect Phantom Wallet</button>
    </div>

    <div class="card">
        <h3>2. Deploy Matrix ($100 Split)</h3>
        <p style="font-size: 12px; color: #888;">Executes a $25 USDC swap into Wrapped BTC via Jupiter DEX.</p>
        <button class="btn" onclick="executeSplitTrade('WBTC', 25.0)" style="background: var(--success); color: #fff;">Execute WBTC Node</button>
    </div>

    <script>
        let userPublicKey = null;
        // CHANGE THIS to your deployed backend URL (e.g., your Railway/Render link)
        const API_URL = "https://your-backend-url.com/api/build_swap"; 

        async function connectPhantom() {
            if (window.solana && window.solana.isPhantom) {
                try {
                    const resp = await window.solana.connect();
                    userPublicKey = resp.publicKey.toString();
                    document.getElementById('wallet-status').innerText = `Status: Connected (${userPublicKey.slice(0, 6)}...)`;
                    alert("Wallet Connected Securely!");
                } catch (err) {
                    alert("User rejected the connection request.");
                }
            } else {
                alert("Phantom Wallet not found! Please install the app/extension.");
            }
        }

        async function executeSplitTrade(asset, amount) {
            if (!userPublicKey) {
                alert("Please connect your wallet first!");
                return;
            }

            alert(`Fetching best DEX route for ${amount} USDC to ${asset}...`);
            
            try {
                // 1. Request the trade payload from Python backend
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        user_public_key: userPublicKey,
                        target_asset: asset,
                        amount_usdc: amount 
                    })
                });
                
                const data = await response.json();
                
                if (!response.ok) throw new Error(data.detail || "API Routing Failed");

                // 2. Deserialize the transaction sent by Jupiter via Python
                const swapTransactionBuf = solanaWeb3.Buffer.from(data.swapTransaction, 'base64');
                const transaction = solanaWeb3.VersionedTransaction.deserialize(swapTransactionBuf);

                // 3. Ask Phantom to sign and send
                alert("Please approve the transaction inside your wallet.");
                const { signature } = await window.solana.signAndSendTransaction(transaction);
                
                alert(`✅ Trade Successful! Network Signature: ${signature}`);
                
            } catch (error) {
                console.error("Execution failed:", error);
                alert(`❌ Trade Failed: ${error.message}`);
            }
        }
    </script>
</body>
</html>
